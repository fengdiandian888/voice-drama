esc": "说会挂上「请勿打扰」牌子，客房服务不会进来"}, {"desc": "调侃你光溜溜带着项圈的样子挺美，逗你给同事欣赏"}, {"desc": "假装被咬，让你躲进衣柜里藏好"}, {"desc": "同事来电敲门，他接起说「进来坐坐当然可以」"}, {"desc": "对同事说没声音你听错了，并把铃铛项圈说成给自家狗狗买的管教用具"}, {"desc": "找出药膏，说在肚子上涂抹揉一揉就会消肿"}, {"desc": "说「我帮你揉」更妥当"}, {"desc": "同事走了，说「出来吧」放你出衣柜"}, {"desc": "看你还哭着，问「哭什么」「怎么还哭了」"}, {"desc": "让你转过去、鼻子抵起来摆出受罚姿势"}, {"desc": "立规矩之后不管做什么都不准出声，否则牵着你去敲同事门"}], "tone_summary": "以 dom/sub 占有式调教为主，夹带偷藏紧张与结尾安抚", "genre_tags": ["现代", "酒店", "宠物扮演", "主仆"], "emotion_arc": "平静调侃→偷藏紧张→被发现后安抚", "intensity": "中", "listener_role": "被当小狗养的恋人（sub）", "signature_elements": ["项圈", "铃铛", "衣柜", "请勿打扰牌"], "sensitive": false}, {"no": 2, "id": "_NA1WMsUG98", "title": "Although we quarreled, I still like you", "title_zh": "虽然我们吵了架，但我还是喜欢你 (Although we quarreled, I still like you)", "duration": "00:07:22", "link": "https://www.youtube.com/watch?v=_NA1WMsUG98", "enriched": true, "lines": [{"ts": "00:00:00", "text": "你干什么呀，这么晚还跑出去试试啊", "speaker": "哥哥", "tone": "生气", "sound": []}, {"ts": "00:00:31", "text": "您好，您拨打的用户暂时无法接通，请稍后再拨", "speaker": "电话提示音", "tone": "平静", "sound": []}, {"ts": "00:01:00", "text": "还知道打过电话呀，你真的是，什么东西什么炸机啊", "speaker": "哥哥", "tone": "生气", "sound": []}, {"ts": "00:01:10", "text": "上次", "speaker": "哥哥", "tone": "平静", "sound": []}, {"ts": "00:01:15", "text": "什么，你为什么突然说这些，又危险什么车", "speaker": "宝宝", "tone": "害怕", "sound": []}, {"ts": "00:01:25", "text": "啊又危险什么车", "speaker": "宝宝", "tone": "害怕", "sound": []}, {"ts": "00:01:32", "text": "你别害怕宝宝，哥哥马上就来，你别害怕，你先别挂电话，哥哥马上就到，先把灯都打开，声音也调成外放", "speaker": "哥哥", "tone": "安抚", "sound": []}, {"ts": "00:01:45", "text": "看到前面的路口了吗，往左边走", "speaker": "哥哥", "tone": "平静", "sound": []}, {"ts": "00:01:51", "text": "宝宝吓死我了，一手担心死我", "speaker": "哥哥", "tone": "后怕", "sound": []}, {"ts": "00:01:59", "text": "走，回家", "speaker": "哥哥", "tone": "平静", "sound": []}, {"ts": "00:02:22", "text": "还走动吗", "speaker": "哥哥", "tone": "平静", "sound": []}, {"ts": "00:02:33", "text": "来过来我帮你上去", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:02:53", "text": "以后再也不能这样了知道了吗，有哥哥在不怕，哥哥在哥哥在，我的傻宝宝呢", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:03:09", "text": "怎么可能不要你啊，吵架归吵架矛盾归矛盾，又不是不喜欢你了", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:03:23", "text": "哥哥最近工作比较忙，应酬很多，把一些工作上的情绪带到生活中来了，这一点呢哥哥先给你道个歉好不好", "speaker": "哥哥", "tone": "歉意", "sound": []}, {"ts": "00:03:42", "text": "哎呦怎么越说越委屈了呢，好怎么不哭了，宝宝不哭了，我知道我知道，我知道你想帮我分担一些，我也知道我的宝贝是关心我爱我这样的，摸摸头，摸头不哭了好不好", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:04:08", "text": "好，那我以后有什么事我都告诉你好吧", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:04:15", "text": "所以不哭了，你泪收住了，嗯，那现在该说说你了", "speaker": "哥哥", "tone": "平静", "sound": []}, {"ts": "00:04:28", "text": "小东西在装，嗯，还洗洗睡了", "speaker": "哥哥", "tone": "戏谑", "sound": []}, {"ts": "00:04:36", "text": "你看看今天外面还下着雪，这么晚的时间你穿这么少就往外跑，然后还被坏人盯上了，我的宝贝这么漂亮，要是被坏人伤害了你让哥哥怎么办，嗯，你是让哥哥愧疚一辈子吗，所以以后绝对不可以再这样了听到了没", "speaker": "哥哥", "tone": "严厉", "sound": []}, {"ts": "00:05:07", "text": "还往人多的地方跑，你不长记性想挨揍是吧，你知道今天情况有多危险吗，如果我再晚到一点什么都有可能发生你知道吗你知不知道吗", "speaker": "哥哥", "tone": "严厉", "sound": []}, {"ts": "00:05:26", "text": "这也差不多，不过呢也要表扬一下你，遇到危险的时候那第一个就想到哥哥，第一时间呢告诉哥哥，这一点做得很棒", "speaker": "哥哥", "tone": "表扬", "sound": []}, {"ts": "00:05:47", "text": "瞪这个圆眼睛看着我干吗", "speaker": "哥哥", "tone": "戏谑", "sound": []}, {"ts": "00:05:55", "text": "但是表扬归表扬，该打屁股打屁股", "speaker": "哥哥", "tone": "命令", "sound": []}, {"ts": "00:06:05", "text": "不多，小惩大诫一下，既然你已经趴上来了不准动", "speaker": "哥哥", "tone": "命令", "sound": []}, {"ts": "00:06:17", "text": "翻", "speaker": "哥哥", "tone": "命令", "sound": []}, {"ts": "00:06:23", "text": "这个教训也能记住吗", "speaker": "哥哥", "tone": "平静", "sound": []}, {"ts": "00:06:30", "text": "谢谢哥哥", "speaker": "宝宝", "tone": "撒娇", "sound": []}, {"ts": "00:06:34", "text": "以往打你都大很大叫，怎么这次", "speaker": "哥哥", "tone": "疑惑", "sound": []}, {"ts": "00:06:43", "text": "我只是在保护我最爱的人，傻瓜，去给你泡杯姜茶，等一下要多喝光，怕你冷别冻感冒了", "speaker": "宝宝", "tone": "撒娇", "sound": []}, {"ts": "00:07:10", "text": "喝完我就帮你去洗漱，洗完手之后咱们再好好睡一觉，哥哥抱着你睡好不好，吓坏了吧今天，没事没事都过去了", "speaker": "哥哥", "tone": "温柔", "sound": []}], "scene": "哥哥（男友）与女友刚吵过架，女友深夜惊慌跑出门差点被陌生人盯上，哥哥通过电话一边安抚一边指引她走到安全路口，再开车接她上车。回家后他先肯定「吵架归吵架又不是不喜欢你」，承认自己把工作情绪带进生活，接着因她深夜穿太少乱跑而严厉娇训并打屁股作为惩罚，最后泡姜茶、帮她洗漱，抱着她睡。主题是「争执后的挽留、惊吓安抚与惩罚式管教」，基调又凶又宠。", "behaviors": [{"desc": "电话里哄「宝宝别害怕，哥哥马上来」，让你开外放"}, {"desc": "指引「看到前面路口往左边走」"}, {"desc": "接你上车，说「来过来我帮你上去」"}, {"desc": "说「怎么可能不要你，吵架归吵架」"}, {"desc": "为把工作情绪带进生活先给你道歉"}, {"desc": "摸摸头安抚「不哭了，摸头不哭了」"}, {"desc": "说你穿这么少往外跑、差点被坏人拐走"}, {"desc": "表扬你遇险第一时间想到哥哥、告诉哥哥"}, {"desc": "说「该打屁股打屁股」"}, {"desc": "让你趴好「小惩大诫」，铺好不准动"}, {"desc": "让你翻过来"}, {"desc": "说去泡姜茶，怕你冷感冒"}, {"desc": "说喝完帮你洗漱，哥哥抱着你睡"}], "tone_summary": "争吵后挽留安抚，又凶又宠的管教式宠溺", "genre_tags": ["现代", "情侣", "日常关怀"], "emotion_arc": "生气→惊吓安抚→温柔认错→严厉娇训→宠溺收尾", "intensity": "中", "listener_role": "恋人／宝宝（sub）", "signature_elements": ["姜茶", "打屁股", "雪夜"], "sensitive": false}, {"no": 3, "id": "jVjX6ipjjhs", "title": "Boyfriend brushed your teeth for you", "title_zh": "男朋友帮你刷牙 (Boyfriend brushed your teeth for you)", "duration": "00:05:53", "link": "https://www.youtube.com/watch?v=jVjX6ipjjhs", "enriched": true, "lines": [{"ts": "00:00:00", "text": "你这个粗心大意的毛病什么时候才能改呀，真的是", "speaker": "哥哥", "tone": "无奈", "sound": []}, {"ts": "00:00:06", "text": "那我去找找好吧，看有没有新的牙刷给你", "speaker": "哥哥", "tone": "平静", "sound": []}, {"ts": "00:00:15", "text": "来这有一个", "speaker": "哥哥", "tone": "平静", "sound": []}, {"ts": "00:00:19", "text": "这有一个这有一个这有一个这有一个这有一个这有一个这有一个这有一个这有一个，刷毛太硬价格贵", "speaker": "哥哥", "tone": "平静", "sound": []}, {"ts": "00:00:37", "text": "可是那不用的怎么办呢，咱们现在小区里不是便利店，现在这个半夜的超市也都关门了，要不然宝贝先讲究一下行不行，明天我一早去给你买回来好吧，不愿意啊，不愿意那我想想你等我一下", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:01:18", "text": "你看，我挑了一个嘟嘟用的纸板包装的牙刷，这好还有个新的，用这个好不好，这个很软，什么叫还是不要了，牙都不刷了不行，忘记上次医生怎么说的了，是哪个小朋友蛀牙的时候把手都抓红了，然后哭哭哭哭哭哭哭哭说我以后一定好好刷牙是不是，不许跑你给我回来", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:01:52", "text": "没刷牙不许上床", "speaker": "哥哥", "tone": "命令", "sound": []}, {"ts": "00:01:57", "text": "再跑，晚上没刷牙可以睡觉吗，牙疼的时候都忘记了是不是，说话，错了，错了的小朋友就要被打屁股，趴好不准动来动去", "speaker": "哥哥", "tone": "命令", "sound": []}, {"ts": "00:02:23", "text": "还能不能好好刷牙了", "speaker": "哥哥", "tone": "无奈", "sound": []}, {"ts": "00:02:28", "text": "每次都要收拾一顿才会乖真的是，起来吧哥哥帮你去好不好", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:02:55", "text": "来来快张嘴听话张嘴快", "speaker": "哥哥", "tone": "命令", "sound": []}, {"ts": "00:03:11", "text": "你在咬", "speaker": "哥哥", "tone": "平静", "sound": []}, {"ts": "00:03:21", "text": "宝宝你到底怎么了，今天今天一直在闹脾气啊，是不是有人不开心你告诉哥哥好不好", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:03:32", "text": "不哭哭哭哭哭哭哭哭，先把嘴里的泡泡吐了说出来，不哭哭哭哭哭哭哭哭哭哭哭哭", "speaker": "哥哥", "tone": "安抚", "sound": []}, {"ts": "00:04:08", "text": "白天的时候就觉得你有点不对劲，平时你那么喜欢小孩子，今天看你嘟嘟都不带她玩", "speaker": "哥哥", "tone": "平静", "sound": []}, {"ts": "00:04:23", "text": "因为我今天抱嘟嘟没有牵你的手啊", "speaker": "宝宝", "tone": "委屈", "sound": []}, {"ts": "00:04:30", "text": "都大人了跟个小孩吃醋行不行", "speaker": "哥哥", "tone": "戏谑", "sound": []}, {"ts": "00:04:39", "text": "你是我的小朋友，你是我最爱的小宝贝，是我的宝贝啊", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:04:48", "text": "那宝贝不委屈了好不好", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:04:54", "text": "那我明天不抱她，我明天只抱着你好吧，我怕你这样抱在怀里，走吧走哪儿抱她呢好不好", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:05:09", "text": "那她小姑娘现在应该叫我什么", "speaker": "哥哥", "tone": "戏谑", "sound": []}, {"ts": "00:05:16", "text": "对，管你，上面小嘴清洁过了", "speaker": "哥哥", "tone": "平静", "sound": []}, {"ts": "00:05:31", "text": "我检查一下我再看嘛", "speaker": "哥哥", "tone": "平静", "sound": []}, {"ts": "00:05:39", "text": "你倒不错", "speaker": "哥哥", "tone": "戏谑", "sound": []}, {"ts": "00:05:45", "text": "所以下面的小嘴是不是应该清洁一下", "speaker": "哥哥", "tone": "调侃", "sound": []}, {"ts": "00:05:52", "text": "打开", "speaker": "哥哥", "tone": "命令", "sound": []}], "scene": "哥哥（男友）帮粗心健忘的「小朋友」刷牙。家里没有新牙刷，他翻出纸套裹着的软毛牙刷，立规矩「没刷牙不许上床」，你闹脾气乱跑，他便抱你过来亲手刷。过程中发现你是因为他昨天带小孩「嘟嘟」玩而吃醋闹别扭，他温柔哄你、承诺明天只抱着你，并仔细检查上下牙齿是否刷干净。主题是「生活化照顾＋小孩式吃醋安抚」，基调 domestic、甜宠。", "behaviors": [{"desc": "找到一个牙刷"}, {"desc": "检查多个牙刷，嫌刷毛太硬"}, {"desc": "用纸套裹着的软毛牙刷给你，说这个很软"}, {"desc": "立规矩「没刷牙不许上床」"}, {"desc": "说再跑晚上没刷牙不能睡，错的小朋友要被打屁股"}, {"desc": "起来说「哥哥帮你刷」"}, {"desc": "让你张嘴「听话张嘴快」"}, {"desc": "你咬牙刷，问「宝宝怎么了今天一直闹脾气」"}, {"desc": "让你先把嘴里的泡泡吐了"}, {"desc": "说白天你就不对劲，平时喜欢小孩今天却不带嘟嘟玩"}, {"desc": "说「你是我的小朋友，我最爱的小宝贝」"}, {"desc": "说「明天不抱她，只抱着你」"}, {"desc": "检查你牙齿刷得干不干净"}, {"desc": "说下面的小嘴也要清洁一下"}, {"desc": "让你再张开嘴"}], "tone_summary": "生活化甜宠，小孩式吃醋安抚与亲手照顾", "genre_tags": ["现代", "情侣", "日常甜宠"], "emotion_arc": "无奈→温柔管束→发现吃醋→宠溺安抚", "intensity": "轻", "listener_role": "被当小朋友的恋人", "signature_elements": ["牙刷", "嘟嘟(小孩)", "打屁股"], "sensitive": false}, {"no": 4, "id": "nfUAnBbTebU", "title": "Boyfriend's recollection letter", "title_zh": "男朋友的回忆信 (Boyfriend's recollection letter)", "duration": "00:06:04", "link": "https://www.youtube.com/watch?v=nfUAnBbTebU", "enriched": true, "lines": [{"ts": "00:00:00", "text": "现在是凌晨两点，刚刚和你结束视频通话的时候还有点不习惯，是看你那羞红的小脸、颤动着睫毛的样子，伴随着你急促的呼吸声，夹杂着喘息，一下又一下撞击着我的心。你什么时候走进我的世界，我开始思考这个问题。记得我们初见面的时候，那天紧张带来的本能反应让你吃了不少苦头，可当我强调不准动的时候你还是乖乖地跟着走。当初我想，这个女孩儿多喜欢我，才愿意接受我的特殊癖好、走进我的世界，也在那个时候决定，要永远爱你。", "speaker": "男友", "tone": "深情", "sound": []}, {"ts": "00:01:34", "text": "我自私又纠结，我不想把这样美好的你带到我的世界来，可是又想把你占为己有。其实我不是一个温柔的人，直到遇到了你，我开始学着去温柔、学着去爱、想永远保护那个小小的你。从来没想到像我这样一个冷血的人，会陪你去做催眠，带你去逛会展，会为你吹干不小心淋湿的头发；即使没有办法陪在你身边的时候，当你做噩梦时，也会在电话的另一头去安慰你、哄你睡觉。当然和你一起探索了不少新鲜事，比如说周末的办公室、下雨的公园、细雨的树荫，这些点点滴滴主人都记得，也格外珍惜。和你在一起的时光，有时候你犯错了我会好好教训你，可是惩罚你那又何尝不是在惩罚我自己。每当我看到你颤抖着保持姿势，身上都是红痕，不停地小声呜咽着，我也会心疼。我想帮你揉揉发红的脸颊，替你擦去脸上的泪妆，再把你一把包进怀里紧紧地抱着，然后一遍一遍地在你耳边告诉你：不怕，我在。", "speaker": "男友", "tone": "温柔", "sound": []}, {"ts": "00:03:48", "text": "每次结束之后，你被包在怀里，委屈地看着我，小心地蹭着我的衣服，像是在求我的原谅，但是又说我不能心软，因为责任，因为爱。", "speaker": "男友", "tone": "深情", "sound": []}, {"ts": "00:04:10", "text": "等回去见到你的时候，我一定也要紧紧把你包进怀里，让你靠在我胸口上听着我的心跳声，给你读这封信，这样还可以时不时地亲亲你的小额头，也不知道我的小哭包会不会再掉眼泪呢。写了这么多，所以我想回答你刚才那个问题，可能你自己都已经记不清了——在你到达顶点的一瞬间那一句说出口的话，你问我可不可以只爱你一个人。我的答案是：我会只爱你，而这个期限是永远。", "speaker": "男友", "tone": "温柔", "sound": []}, {"ts": "00:05:58", "text": "我会只爱你一个人，而这个期限是永远。", "speaker": "男友", "tone": "深情", "sound": []}], "scene": "凌晨两点，男友在视频通话后写下一封回忆信，对着睡着的你低声朗读。他回顾初见时你乖顺的模样、自己如何学会温柔、如何为你吹干头发、在电话另一端哄你入睡；也坦白惩罚你时其实也在惩罚自己，会在事后把你揉进怀里擦泪安慰。最后他承诺回去要紧紧抱你听心跳读这封信，并回答你曾问过的话——「我会只爱你一个人，期限是永远」。这是一封纯独白式情书，基调深情、温柔、带轻微管教回忆。", "behaviors": [{"desc": "凌晨两点视频通话后提笔写回忆信，描述初见你乖乖认错的样子"}, {"desc": "回忆为睡着的你吹干头发、电话里哄睡，以及惩罚后揉你发红处、擦泪、把你包进怀里"}, {"desc": "回忆每次结束把你包在怀里，你蹭着他衣服像在求原谅"}, {"desc": "说等回去要紧紧把你包进怀里、靠在他胸口听心跳读这封信"}, {"desc": "重复回答你的问题：「我会只爱你一个人，而这个期限是永远」"}], "tone_summary": "深情独白式情书，温柔回忆与占有式承诺", "genre_tags": ["现代", "情书", "独白"], "emotion_arc": "思念→回忆温柔与管教→承诺永远", "intensity": "轻", "listener_role": "睡着的恋人（你）", "signature_elements": ["回忆信", "心跳", "永远"], "sensitive": false}, {"no": 5, "id": "5czOeMmmXqs", "title": "Come back to me...my kitty", "title_zh": "回到我身边……我的小野猫 (Come back to me...my kitty)", "duration": "00:07:14", "link": "https://www.youtube.com/watch?v=5czOeMmmXqs", "enriched": true, "lines": [{"ts": "00:00:00", "text": "小野猫我想你，好像从那个很冷的雨天之后你真的彻底离开我了。今天又是个雨天，就想起很多我们以前的事情。以前我对你很多说教，尤其是你离开我之后就像走马灯一样在我脑子里。我还能再对你说一次吗——不回家就不会来打你，你做好跑路的准备了吗？这下离开主人，对，你自由了，你可以作为一个正常的女孩子，穿着漂亮的裙子脚踏高跟鞋，也不会有门禁，也不会受伤，对，不会有鞭子扫过你的后背，也不会有皮带束缚着你的双手，不会背那条你不喜欢的项圈吊着了。你可以像别的女孩一样恋爱、结婚、生孩子，而不是像一只乖的狗狗一样绑在我身边，像一个漂亮的小金丝雀一样，对我却依然在这个小房子里。所以……", "speaker": "主人", "tone": "怅惘", "sound": []}, {"ts": "00:02:20", "text": "最后准备了吗，离开我你就自由了。还记得吗，我曾经对你说过很多次这样的话，你确实是不听话的小猫，一次一次偷偷地离开，一次又一次被我再带回来。我跟你说过，如果我想让你在我身边，你就永远也逃不走。", "speaker": "主人", "tone": "占有", "sound": []}, {"ts": "00:03:00", "text": "你比我想象的聪明很多，也可能是我不再对你这么有底气，可能是戒备心，也可能是我不再想阻止你了。一次一次把自己弄伤，多少次翻窗怕水管离开这里，多少次我也记不清。今天带你去医院的时候也试图逃跑过好多回，你还记得吗？后来出门的时候你都是坐在车上、坐在我的副驾驶和你的轮椅里，我说我怕你太累，只想用安全带帮你锁起来。这段日子是你从我身边溜走机会最少的日子，我确实不用费神再注意你不要溜走，可是你也看起来确实不开心，所以后来我也就没再这样了，对吧？我说过不会让你不开心的。你还说你从没想在我身边，怎么可能？也记得我们刚认识的时候吗，你看着我对着我笑，你留着头发的时候不是都在告诉我你喜欢我呢，然后我愿意带你出去玩，我们一起吃好吃的，还去看你最喜欢的画展。我们，我们，不是吗？我一直以为你对我的感情和我对你的感情是一样的，只是想一直一直带在对方的身边，不是吗？", "speaker": "主人", "tone": "坦诚", "sound": []}, {"ts": "00:05:44", "text": "你说是我比你更需要你，我更需要你吗？可能吧，可能确实是我更喜欢你一点。但是你用了心，所以，所以你也是喜欢我的吧？", "speaker": "主人", "tone": "温柔", "sound": []}, {"ts": "00:06:10", "text": "什么，哪怕只是一点，一点也没有吗？算了算了，算了还不说这些。你还记得我们隔壁那个很热情的阿姨吗？前几天碰到她了，她说她很久没见到你了。是啊，我也很久没见到你了。我的小猫咪，你在那，你在那，你再回来一下好不好，好不好？这次我不会再让你逃走了，好不好，好不好？", "speaker": "主人", "tone": "恳求", "sound": []}], "scene": "主人（dom）对着曾试图离开他的「小野猫／小猫」低声倾诉。她因一次次逃跑、自伤被送医而坐过轮椅，他回忆她屡次偷偷离开又被他带回来，也坦白也许自己不再像从前那样紧锁她。他感伤地说可能自己更离不开她，并提到隔壁热情的阿姨很久没见她，最后软下声气恳求「你再回来一下好不好，这次我不会再让你逃走了」。主题是「宠物扮演中的出走与挽留」，基调怅惘、占有又带着不舍。", "behaviors": [{"desc": "对小野猫说想你，提到那次很冷的争执后你真的离开了"}, {"desc": "说你是不听话的小猫，一次次偷偷离开又被他带回来"}, {"desc": "回忆带你去医院时你试图逃跑，车上坐在他腿上轮椅里，他用安全带把你锁好"}, {"desc": "自问「是我更需要你吗」，承认可能自己更喜欢你一点"}, {"desc": "提到隔壁热情阿姨很久没见你，恳求「再回来一下好不好」"}], "tone_summary": "怅惘占有式的出走挽留，外冷内热的不舍", "genre_tags": ["现代", "宠物扮演", "主仆", "出走与挽留"], "emotion_arc": "怅惘→回忆占有→坦诚不舍→恳求回归", "intensity": "中", "listener_role": "曾试图离开的小野猫（sub）", "signature_elements": ["项圈", "鞭子", "皮带", "轮椅", "金丝雀"], "sensitive": false}, {"no": 6, "id": "Kw2_MFqXyUM", "title": "Come to me when you are depressed", "title_zh": "难过的时候来找我 (Come to me when you are depressed)", "duration": "00:06:54", "link": "https://www.youtube.com/watch?v=Kw2_MFqXyUM", "enriched": true, "lines": [{"ts": "00:00:00", "text": "哎，这是怎么了，怎么还摔东西了，捡起来", "speaker": "哥哥", "tone": "疑惑", "sound": []}, {"ts": "00:00:19", "text": "过来，站好，告诉哥哥为什么乱扔东西。不说话是吧，手伸出来，哪只手扔的，右手是吧，举平举平了。你都看着我，哎，我这怎么还哭了呢，我都还没开始罚呢，好吧", "speaker": "哥哥", "tone": "严厉", "sound": []}, {"ts": "00:01:14", "text": "我这衣服刚换上，这眼泪鼻涕全蹭我衣服上了。好没事没事，我也会再换一件吧，不哭了不哭了，快，没事了，好点了吗？是怎么了，看你最近情绪都不太稳定的样子，憋了好久话不出来，所以越来越烦躁了，哎呦辛苦的宝宝了", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:02:06", "text": "但是再怎么烦躁，咱们也不能乱扔东西啊对不对，万一没注意，不小心把那个玻璃的弄碎了，然后弄伤自己怎么办，到时候我就心疼啊是不是。好，不关你不关你，没有说你，先把眼泪擦一擦，再跟我说说。我知道，我知道的，宝贝就是心里面可能突然觉得又累又情绪，是不是。正常的宝贝，正常不用怪自己，那我们当然可以允许自己有难过、脆弱的时候对吧，只要我们不要一直沉浸在里面就可以了。而且你看，我们每个人都要经历一些不那么开心的日子，可能有时候一觉醒来，就觉得全都过去了，是不是？哥哥都陪着你都陪着你，所以我们耐心一点，给好运一点时间，对不对", "speaker": "哥哥", "tone": "安抚", "sound": []}, {"ts": "00:04:20", "text": "所以你要是不高兴了、情绪低落了，下次不砸东西了，你过来找哥哥好不好，扑到我怀里行不行，扑到我怀里开始哭，哭完再说，那哥哥这里永远是你最好听众", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:04:40", "text": "那以后我们说好了，心情不好的时候不再摔东西了，就知道摔东西是不是不对的", "speaker": "哥哥", "tone": "平静", "sound": []}, {"ts": "00:04:53", "text": "好，不罚不罚，就这样不罚你", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:05:00", "text": "我也理解，宝贝这些心情不好，但是以后不能再这样了，你是个大宝宝了，我们懂道理的，下次如果大宝宝再不听话的话，可就不会放过你了，听到了没", "speaker": "哥哥", "tone": "命令", "sound": []}, {"ts": "00:05:23", "text": "哭也哭过了，我帮你看看你画的图好不好", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:05:34", "text": "对，虽然我不是专业的，但是毕竟我的人生经验比你多一些，可能会给你一些新的想法，如果这个想法不行咱们就换个思路，没有什么是解决不了的对吧，不用担心", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:05:52", "text": "那我本来给你准备一个惊喜，想不想知道", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:06:00", "text": "当然是真的了", "speaker": "哥哥", "tone": "平静", "sound": []}, {"ts": "00:06:04", "text": "我好好，我本来就好好。那本来是要周末再告诉你的，然后这不是看你心情不好吗，嗯，想你开心开心", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:06:18", "text": "你看最近上映了这个，这是什么片子，你不是一直想去看吗", "speaker": "哥哥", "tone": "平静", "sound": []}, {"ts": "00:06:27", "text": "我买了激光巨幕的厅，周末咱们就看电影，顺便顺便好不好，好，还带好吃的，好，那只能偷偷吃", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:06:42", "text": "那你也答应我一件事情，以后心情不好来跟我说，不准跟自己发脾气，知道吗", "speaker": "哥哥", "tone": "命令", "sound": []}, {"ts": "00:06:54", "text": "快", "speaker": "哥哥", "tone": "平静", "sound": []}], "scene": "哥哥发现抑郁低落的女友砸了东西、手伸着在哭，先检查是哪只手扔的、有没有被玻璃划伤，随后转为温柔安抚：允许她有难过脆弱的时候，但约定以后心情不好不准摔东西，要直接扑进他怀里哭。他看你画的画、送上准备了许久的电影票惊喜，并约好周末一起看电影。主题是「情绪崩溃后的接纳与引导」，基调耐心、包容、治愈。", "behaviors": [{"desc": "让你站好、伸手，问哪只手扔的东西"}, {"desc": "衣服被你眼泪蹭湿，说「不哭了不哭了」"}, {"desc": "说再烦躁也不能乱摔东西伤到自己"}, {"desc": "说不开心就扑到他怀里开始哭，他的怀抱永远听你倾诉"}, {"desc": "说「不罚不罚」这次不罚你"}, {"desc": "帮你看你画的图，说能给些想法"}, {"desc": "说本来准备了惊喜问你想不想知道"}, {"desc": "说买了电影票，周末一起看电影还带好吃的"}, {"desc": "约你以后心情不好就来跟他说，不准跟自己发脾气"}], "tone_summary": "情绪崩溃后的接纳与引导，耐心包容治愈", "genre_tags": ["现代", "情侣", "治愈", "情绪安抚"], "emotion_arc": "责问→发现情绪问题→温柔接纳→惊喜治愈", "intensity": "轻", "listener_role": "抑郁低落的恋人（宝宝）", "signature_elements": ["摔东西", "画图", "电影票惊喜"], "sensitive": false}, {"no": 7, "id": "YxAQKKJpQdY", "title": "Comfort after punishment", "title_zh": "惩罚后的安抚 (Comfort after punishment)", "duration": "00:06:54", "link": "https://www.youtube.com/watch?v=YxAQKKJpQdY", "enriched": true, "lines": [{"ts": "00:00:00", "text": "你已经把脸埋在被子里面半个小时了，现在可以出来了吧", "speaker": "哥哥", "tone": "平静", "sound": []}, {"ts": "00:00:14", "text": "怎么了，有什么不开心的，和哥哥说说好不好", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:00:31", "text": "还是不出来", "speaker": "哥哥", "tone": "平静", "sound": []}, {"ts": "00:00:39", "text": "是不是因为刚才罚你委屈了", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:00:47", "text": "都猜中了，怎么还委屈呢", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:00:55", "text": "那你出来，出来哥哥抱抱好不好，抱抱就不委屈了好不好，快听话，不说话就当你是默认了，那我可就掀被子了", "speaker": "哥哥", "tone": "戏谑", "sound": []}, {"ts": "00:01:16", "text": "怎么哭成这个样子，过来过来过来，哥哥抱抱", "speaker": "哥哥", "tone": "心疼", "sound": []}, {"ts": "00:01:28", "text": "我看看小脸，看看，都哭成小花猫了，是吧", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:01:41", "text": "现在知道躲我怀里了，抱着抱着", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:01:50", "text": "哥哥在哪，哥哥在哪，乖没事，都放下吧，哥哥在哪，哥哥在", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:02:05", "text": "跟我说说，今天怎么哭这么凶", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:02:12", "text": "平时罚你罚得比今天重的时候你也没哭这么厉害，所以到底是怎么了", "speaker": "哥哥", "tone": "疑惑", "sound": []}, {"ts": "00:02:26", "text": "你呀，现在才知道害怕了，我的小傻瓜，不怕不怕", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:02:41", "text": "这就是和自己过不去呢，是吧", "speaker": "哥哥", "tone": "平静", "sound": []}, {"ts": "00:02:47", "text": "听好了，你不笨，哥哥也不会不要你，抬头，抬头看着我", "speaker": "哥哥", "tone": "命令", "sound": []}, {"ts": "00:02:59", "text": "你自己说说，刚刚为什么凶你", "speaker": "哥哥", "tone": "平静", "sound": []}, {"ts": "00:03:06", "text": "你也知道自己不听话，刚才怎么和哥哥说话的", "speaker": "哥哥", "tone": "平静", "sound": []}, {"ts": "00:03:14", "text": "明明知道错了还嘴硬，我看哪平时就是太宠着你了，所以把你惯得越来越没规矩，下次还敢不敢这样", "speaker": "哥哥", "tone": "严厉", "sound": []}, {"ts": "00:03:29", "text": "这还差不多，那每次只有被罚了才能长记性吗", "speaker": "哥哥", "tone": "平静", "sound": []}, {"ts": "00:03:41", "text": "好了好了好了，怎么又哭了，抱抱抱抱，哥哥不生气了，哥哥不生气了，我们罚完了这个事呢就过去了，哥哥爱你不会变也不会不要你，好不好", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:04:03", "text": "我知道，哥哥知道错了，也不用再道歉了，我也知道你不是故意想这样的，因为毕竟是个小朋友吗，所以有些不听话犯错的时候也很正常对吧", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:04:26", "text": "我看看，来我看看膝盖还疼不疼", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:04:33", "text": "亲亲好不好", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:04:37", "text": "来来，靠过来", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:04:43", "text": "靠怀里", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:04:50", "text": "刚才让你跪了有十分钟吧，你看你，噢，说得多大委屈一样", "speaker": "哥哥", "tone": "戏谑", "sound": []}, {"ts": "00:05:05", "text": "不过刚才哄你这个小屁股跪在墙角的样子，挺乖的", "speaker": "哥哥", "tone": "戏谑", "sound": []}, {"ts": "00:05:20", "text": "好了，不打你你还羞的，就是让你又羞又怕，这样下次就再不会犯错了", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:05:36", "text": "拍照干吗", "speaker": "哥哥", "tone": "疑惑", "sound": []}, {"ts": "00:05:40", "text": "想要亲亲？可是你今天不乖啊，我们怎么说的，不乖就没有亲亲对吧。这小眉头，眯着什么，那说好了，以后从今天开始，只有乖乖的小朋友才可以亲亲", "speaker": "哥哥", "tone": "戏谑", "sound": []}, {"ts": "00:06:07", "text": "不够", "speaker": "宝宝", "tone": "撒娇", "sound": []}, {"ts": "00:06:13", "text": "什么叫长长的亲亲，什么叫长长的亲亲", "speaker": "宝宝", "tone": "撒娇", "sound": []}, {"ts": "00:06:25", "text": "也太可爱了，那个叫长长的亲亲是吧，好，就凑过来闭上眼睛", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:06:41", "text": "够长吗", "speaker": "哥哥", "tone": "戏谑", "sound": []}, {"ts": "00:06:46", "text": "对，对", "speaker": "宝宝", "tone": "撒娇", "sound": []}, {"ts": "00:06:53", "text": "对", "speaker": "宝宝", "tone": "撒娇", "sound": []}], "scene": "男友（对话中自称「哥哥」「抱抱」）在你受罚（打屁股、罚站）之后，把你从躲着的被子里哄出来。他温柔安抚哭泣的你，捧脸查看，检查你膝盖与屁股上的红肿伤处，最后以亲吻和解。整体是「惩罚后的温柔安抚」型亲密角色扮演，基调 domestic、甜蜜，带轻微管教／spanking 元素。", "behaviors": [{"desc": "半开玩笑哄你出被子，说「不说话就当你是默认了」，作势要掀被子"}, {"desc": "招手让你「过来过来过来」"}, {"desc": "捧起你的脸看，说你「哭成小花猫」"}, {"desc": "低头查看你膝盖是否还疼"}, {"desc": "提及刚才罚你站了约十分钟"}, {"desc": "立规矩「不乖就没有亲亲」，约定以后只有乖  "sound": []}, {"ts": "00:04:00", "text": "哥哥真的想一直陪着你，但是我也总有身不由己的时候，所以这样的时候宝贝要学会照顾自己，知道吗？就像今天晚上做得很好，不要这样", "speaker": "老公", "tone": "温柔", "sound": []}, {"ts": "00:04:21", "text": "好，说完正事再抱。先说正事，还有就是哥哥说过无数次，咱们要互相信任，没事别总胡思乱想。你看看你后面发的这些，这都是什么，问我是不是在和别的小姑娘吃饭，还有这个，是不是去做见不得人的事了，你想象力挺不错的呀", "speaker": "老公", "tone": "戏谑", "sound": []}, {"ts": "00:04:50", "text": "别说吃饭了，我接个女同事电话你都在那儿嘟嘴半天，我还真服了你这个小醋坛子", "speaker": "老公", "tone": "戏谑", "sound": []}, {"ts": "00:05:00", "text": "再说了", "speaker": "老公", "tone": "平静", "sound": []}, {"ts": "00:05:04", "text": "昨天晚上你种的这个草莓印子还没消呢，我今天一整天领带都不敢解开", "speaker": "老公", "tone": "宠溺", "sound": []}, {"ts": "00:05:17", "text": "这还不能证明我们属于彼此吗", "speaker": "老公", "tone": "温柔", "sound": []}, {"ts": "00:05:22", "text": "不够啊", "speaker": "宝宝", "tone": "撒娇", "sound": []}, {"ts": "00:05:26", "text": "你要觉得这点痕迹不够的话", "speaker": "老公", "tone": "戏谑", "sound": []}, {"ts": "00:05:32", "text": "那我下次在你出门之前，先把你的小屁股打开花，这样的话屁股肿翻天，就没清醒胡思乱想了，对吧，以后不敢了，每次都这样，好好讲到底没有，非得给你来点硬的是不是", "speaker": "老公", "tone": "戏谑", "sound": []}, {"ts": "00:06:05", "text": "今天呢看你身体不舒服，现在放过你，不过再敢要下次，好，看我打不打你", "speaker": "老公", "tone": "温柔", "sound": []}, {"ts": "00:06:20", "text": "现在可以躺下了吧", "speaker": "老公", "tone": "温柔", "sound": []}, {"ts": "00:06:24", "text": "你先躺下吧，我去洗个澡，等我洗过来，我也想抱着香香的宝贝我们一起睡好吧", "speaker": "老公", "tone": "温柔", "sound": []}, {"ts": "00:06:38", "text": "抱这么近", "speaker": "宝宝", "tone": "撒娇", "sound": []}, {"ts": "00:06:42", "text": "那我不洗了", "speaker": "宝宝", "tone": "撒娇", "sound": []}, {"ts": "00:06:46", "text": "不洗我还睡不着，好了太可爱了，好不走不走不走", "speaker": "老公", "tone": "温柔", "sound": []}, {"ts": "00:06:56", "text": "靠怀里，够不够，可睡吧", "speaker": "老公", "tone": "温柔", "sound": []}, {"ts": "00:07:12", "text": "打呼了", "speaker": "旁白", "tone": "平静", "sound": []}, {"ts": "00:07:20", "text": "爸爸，真睡着了", "speaker": "宝宝", "tone": "撒娇", "sound": []}, {"ts": "00:07:42", "text": "我的小宝贝为什么还是这么蜷缩着", "speaker": "老公", "tone": "温柔", "sound": []}, {"ts": "00:07:49", "text": "看起来一副撒娇无理取闹的样子，一定自己在家里面闹过了很久吧", "speaker": "老公", "tone": "温柔", "sound": []}, {"ts": "00:08:05", "text": "我知道你满眼都是我的样子", "speaker": "老公", "tone": "温柔", "sound": []}, {"ts": "00:08:12", "text": "可是你怎么就发现不了，我眼中也只装着一个你", "speaker": "老公", "tone": "深情", "sound": []}, {"ts": "00:08:22", "text": "算了没关系，你不知道呢，以后就说给你听，一遍记不住就说十遍，十遍不够就一百遍，以后的日子还长着呢", "speaker": "老公", "tone": "深情", "sound": []}, {"ts": "00:08:42", "text": "爸爸呀，我爱你呀，好爱好爱", "speaker": "老公", "tone": "深情", "sound": []}], "scene": "老公／哥哥／抱抱深夜应酬回家，发现你没睡、眼睛红红的，以为你在等他哭过。他解释手机没电才没回消息，承诺明天给你买奶茶，又查你身体舒不舒服、有没有自己吃药。翻到你昨天种在他身上的吻痕，以此证明你们属于彼此；对你乱发消息吃醋的小性子又气又宠，扬言下次出门前把你小屁股打肿，最后放弃洗澡、抱着你入睡。主题是「晚归后的安抚与信任危机」，基调宠溺中带点占有。", "behaviors": [{"desc": "看你眼睛红，说「你刚刚哭过」"}, {"desc": "说要把你睡着的样子录下来给小猪自己看"}, {"desc": "手机没电道歉，说项目重要聊忘了看手机"}, {"desc": "说明天出去玩一定买奶茶，问你身体舒不舒服"}, {"desc": "问今天暖和不暖和，要给宝贝买暖宝宝"}, {"desc": "说要互相信任，念你发的吃醋消息"}, {"desc": "指你昨天种的草莓印还在，领带都不敢解开"}, {"desc": "说下次你出门前先把小屁股打肿"}, {"desc": "让你躺下，他去洗个澡"}, {"desc": "你抱得很近，他说「那我不洗了」"}, {"desc": "把你靠在怀里问「够不够」"}, {"desc": "发现你真睡着了"}, {"desc": "轻声说「抱抱呀，我爱你呀，好爱好爱」"}], "tone_summary": "晚归后的宠溺安抚与信任危机化解，占有又温柔", "genre_tags": ["现代", "情侣", "晚归", "信任"], "emotion_arc": "质问→解释→吃醋→占有安抚→深情入睡", "intensity": "中", "listener_role": "等他回家的恋人（你）", "signature_elements": ["草莓印", "奶茶", "打屁股玩笑"], "sensitive": false}, {"no": 9, "id": "CzKq0_VdO8U", "title": "Consequences of angering the sugar daddy (abridged version)", "title_zh": "惹怒金主的下场（删减版） (Consequences of angering the sugar daddy)", "duration": "00:06:16", "link": "https://www.youtube.com/watch?v=CzKq0_VdO8U", "enriched": true, "lines": [{"ts": "00:00:00", "text": "吃醋这么厉害，今天", "speaker": "金主", "tone": "平静", "sound": []}, {"ts": "00:00:30", "text": "别闹，让老公笑话你", "speaker": "金主", "tone": "调侃", "sound": []}, {"ts": "00:00:35", "text": "你先别动，我给你看个东西", "speaker": "金主", "tone": "平静", "sound": []}, {"ts": "00:00:43", "text": "怎么不说话了，刚刚不是还要我亲亲抱抱吗", "speaker": "金主", "tone": "调侃", "sound": []}, {"ts": "00:00:52", "text": "照片里男人很眼熟吗", "speaker": "金主", "tone": "平静", "sound": []}, {"ts": "00:00:58", "text": "是你这部戏的男一号吧，只是拍戏拍戏到半夜在酒店里，拿糊弄媒体那套说辞来糊弄我，还是你真以为我想要你解释啊", "speaker": "金主", "tone": "质问", "sound": []}, {"ts": "00:01:21", "text": "宝贝啊", "speaker": "金主", "tone": "平静", "sound": []}, {"ts": "00:01:25", "text": "你是小明星做久了，是忘了自己怎么一步步爬上来的了", "speaker": "金主", "tone": "冷", "sound": []}, {"ts": "00:01:39", "text": "这还是我戳到你伤心事了，怎么还生气了，你不觉得该委屈的人是我吗？我费钱费力费人忙活了几年，我到头来讲了一条不忠心的狗啊", "speaker": "金主", "tone": "愤怒", "sound": []}, {"ts": "00:01:58", "text": "什么叫我占有欲强，我不把你当人看？你当初求着非要赖我身边的时候，你那时候总不信我占有欲强。不说了，我为什么不说，是吧日子过久了脾气也长上来了，想走啊那你可瞧好了，老周，靠边停车", "speaker": "金主", "tone": "愤怒", "sound": []}, {"ts": "00:02:58", "text": "我办公室现在是什么人都能放进来的吗，小李带他出去", "speaker": "金主", "tone": "命令", "sound": []}, {"ts": "00:03:08", "text": "你还有什么话，咱们现在没有什么关系了", "speaker": "金主", "tone": "冷", "sound": []}, {"ts": "00:03:16", "text": "知道错了", "speaker": "你", "tone": "顺从", "sound": []}, {"ts": "00:03:22", "text": "事实压不下去了吧", "speaker": "金主", "tone": "冷", "sound": []}, {"ts": "00:03:28", "text": "哎呦情形我也看到了，三线小花就至于婚内出轨，你真是凭一己之力养活了一大批媒体人", "speaker": "金主", "tone": "讽刺", "sound": []}, {"ts": "00:03:42", "text": "我帮你是你来求我帮，来过来我看看", "speaker": "金主", "tone": "掌控", "sound": []}, {"ts": "00:03:53", "text": "你还真把自己看得挺重要的", "speaker": "金主", "tone": "冷", "sound": []}, {"ts": "00:03:58", "text": "嘛公司的损失就不劳你费心了，那么多签约的新人随便跑一跑，哪个也比你这个养不熟的东西争气", "speaker": "金主", "tone": "冷", "sound": []}, {"ts": "00:04:13", "text": "是你自己走呢，还是我叫保安", "speaker": "金主", "tone": "命令", "sound": []}, {"ts": "00:04:22", "text": "你先出去吧小李，刚刚在这里你什么也没看见，记住了吗", "speaker": "金主", "tone": "命令", "sound": []}, {"ts": "00:04:36", "text": "先起来", "speaker": "金主", "tone": "平静", "sound": []}, {"ts": "00:04:40", "text": "当着外人说跪就跪，哎呀你这样一闹吧，小东西有一只眼睛都哭肿了，只要是放在从前呢我一定会心疼死的，不过现在", "speaker": "金主", "tone": "复杂", "sound": []}, {"ts": "00:05:01", "text": "想让我帮你的话，那你得先让我高兴高兴", "speaker": "金主", "tone": "掌控", "sound": []}, {"ts": "00:05:11", "text": "是你来求我的，别让我说那么些废话", "speaker": "金主", "tone": "命令", "sound": []}, {"ts": "00:05:20", "text": "哭什么，真的是，过来", "speaker": "金主", "tone": "平静", "sound": []}, {"ts": "00:05:33", "text": "这样就脸红了，这看起来可真像是害羞腼腆的小猫咪，可是谁能想到一旦离开主人的视线你胆子有这么大呢", "speaker": "金主", "tone": "戏谑", "sound": []}, {"ts": "00:05:52", "text": "老婆，你好好记着，你只能是我的", "speaker": "金主", "tone": "占有", "sound": []}, {"ts": "00:06:04", "text": "这次就算了，那些事我来处理，接下来几天你就在家里好好地接受我的惩罚，听到了吗", "speaker": "金主", "tone": "命令", "sound": []}], "scene": "金主（sugar daddy／主人）因手下小明星女友与男一号的绯闻照片动怒，在车里与办公室里上演权力博弈：他甩出照片质问、以撤资源相胁，先是冷酷宣称「现在没关系了」、叫保安赶人，随后把你叫回来、看你哭红眼又心软，要你求他才肯摆平，并宣告「你只能是我的」，罚你接下来几天在家接受惩罚。主题是「金主式占有、吃醋与服从」，基调强势、掌控、带轻微调教。", "behaviors": [{"desc": "让你别动，说给你看个东西（照片）"}, {"desc": "问照片里男人眼熟吗，点破是男一号"}, {"desc": "说「想走啊那你瞧好了」，令司机靠边停车"}, {"desc": "到办公室说「小李带他出去」"}, {"desc": "冷声说「我们现在没什么关系了」"}, {"desc": "招手「过来我看看」"}, {"desc": "问你是自己走还是他叫保安"}, {"desc": "让小李出去，叮嘱「刚刚什么也没看见」"}, {"desc": "让你起来"}, {"desc": "说想让他帮忙就先让他高兴高兴"}, {"desc": "说「过来」，问你哭什么"}, {"desc": "看你脸红，说像只害羞的小猫咪"}, {"desc": "宣告「你只能是我的」"}, {"desc": "说接下来几天在家好好接受他的惩罚"}], "tone_summary": "金主式占有、吃醋与服从博弈，强势掌控", "genre_tags": ["现代", "金主", "占有", "服从"], "emotion_arc": "动怒质问→冷酷驱逐→心软要挟→宣告占有", "intensity": "中", "listener_role": "小明星女友（sub）", "signature_elements": ["绯闻照片", "保安", "惩罚"], "sensitive": false}, {"no": 10, "id": "W8wtlH0bi3E", "title": "Dad's expectations", "title_zh": "爸爸的期望 (Dad's expectations)", "duration": "00:06:44", "link": "https://www.youtube.com/watch?v=W8wtlH0bi3E", "enriched": true, "lines": [{"ts": "00:00:00", "text": "对不起啊哥哥回来晚了，自己吃东西了吗，真乖，过来过来快来亲一下，对对对，喝了点酒，没有没有没喝多", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:00:40", "text": "今天宝贝，今天其实我不是去应酬的，是你爸打电话叫过去的，没事没事不是有事都挺好的，爸是有话跟我说。什么，那当然是和女婿说的话，不瞒你，你坐好你先坐下，妈让我跟你说", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:01:14", "text": "哎呀今天呢就陪着爸喝了几杯吧，然后跟我聊的还挺多的。爸觉得特别地对不起你，他和妈很年轻就有了你，妈第一次为人父母就不太懂得怎么照顾一个女孩子，所以小时候你摔倒了被人欺负了哭着鼻子回家，她是不是老没出席是吧。长大一些的时候你是学校里面的佼佼者，考了好成绩回家她也总是跟你说，说这是优秀的孩子本来就该有的样子。然后她还说事业上没给过你什么照顾都是你自己打拼，所以她一直觉得你成长得很好，是她的一个骄傲", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:02:19", "text": "但是知道前几天听说你晕倒在学校还住院了，但是还是等到病好了再跟她说，她突然就觉得养大你的方法可能可能错了。对，她说你是个女孩子本来应该是娇里娇气地长大，但是她却用了男孩子的方法把你养大", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:02:48", "text": "又怎么哭了呀，哭吧哭吧，想哭就哭，在哥哥怀里你想怎样都可以", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:03:01", "text": "我觉得她可能老人家觉得没有办法当着你的面把这一话说出来吧，所以这不才给我打电话吗，然后还说你特别懂事，说相信你一定能和我们家人相处好也能照顾好我。我说那可不是吗，我说对，把你痛夸", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:03:28", "text": "她就觉得她不希望，她说哎呀她说错养了你二十年吗，在你嫁给我之后我还要一直这样下去，听那句话挺心酸的，爸爸的宝贝", "speaker": "哥哥", "tone": "心疼", "sound": []}, {"ts": "00:03:46", "text": "我之前其实还感觉吧，你还以为你跟爸关系就不是很好，通过今天谈话我想我知道原因了", "speaker": "哥哥", "tone": "平静", "sound": []}, {"ts": "00:03:59", "text": "哎呀老爷子我觉得不是一个特别善于谈的人，她一定是鼓起了很大的勇气在打电话，也是鼓起了很大勇气在说了这些话的，我还看到她满眼都是期待的眼光", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:04:21", "text": "宝贝啊", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:04:26", "text": "让我特别心疼的还是你，哥哥也终于懂你的坚强。记得第一次我见到你的时候，你就一个人小小的，然后一个小姑娘一个人搬了好大想东西，我过去的时候我帮你，让你说没关系，但你小脸上全是汗和泪，那个小泪痕都沾在脸上，手都红了。而且你真的就像一个倔强的小姑娘，为什么要这么拼呢。我们在一起之后你也是这样，什么事都自己硬撑不找我，从来不娇气不耍赖，就总那么懂事", "speaker": "哥哥", "tone": "心疼", "sound": []}, {"ts": "00:05:15", "text": "但是宝宝你看着我，抬头看着哥哥眼睛听我说。虽然可能你是以男孩子方式长大，但是现在你就是最最最宝贝、最最最娇贵的小公主。从今天开始你不能扛事不能提东西，就是一个三岁的小朋友，发生任何事情只要躲在哥哥怀里、躲在哥哥身后就可以了。开心的时候就出来蹦蹦跳跳，然后马上就躲回去，懂了吗", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:06:07", "text": "咱们就说好了，要是以后有什么事你还自己扛的话，哥哥要惩罚你记住了没。嗯抱着抱着抱着，怪你不过啦不哭了", "speaker": "哥哥", "tone": "温柔", "sound": []}, {"ts": "00:06:38", "text": "好，那明天我陪你回去看看老人家，咱明天就回去", "speaker": "哥哥", "tone": "温柔", "sound": []}], "scene": "哥哥回家后告诉女友：岳父（你爸）打来电话，为自己从小用「养男孩」的方式把你带大、让你太要强而致歉，并说很为你骄傲。他借此抱你入怀，让你痛哭一场，并宣布从今天起你不再是扛事的大人，而是「最宝贝的小公主、三岁的小朋友」，有事只准躲进哥哥怀里。主题是「长辈致歉引发的情感解绑与宠溺」，基调治愈、温情、充满拥抱。", "behaviors": [{"desc": "回来晚先问你吃没吃，让你过来亲一下"}, {"desc": "说不是去应酬，是岳父打电话找他聊"}, {"desc": "转述陪岳父喝酒，岳父觉得对不起你、把你当男孩养大"}, {"desc": "你哭了，说「想哭就哭，在哥哥怀里怎样都可以」"}, {"desc": "说岳父满眼都是期待的眼光"}, {"desc": "说特别心疼你，回忆初见时你一人搬重物手都红了"}, {"desc": "让你看着哥哥眼睛，宣布你是小公主、从今天起是不能提东西的三岁小朋友"}, {"desc": "约好以后有事自己扛就惩罚，抱着你"}, {"desc": "说明天陪你回去看看老人家"}], " 小宠物，被起名「乃求求／小奶球」。情境起点：他上门见你，确认你就是网上那个软糯的「小压头」，随后娇你跪坐、认主、起名，把你抱到腿上抚摸，去宠物用品店定制刻字的宠物牌，最后在车上给你戴上专属项圈。整体是「签约认主＋戴项圈」型宠物调娇扮演，基调暧昧、服从、宠溺，带明显 BDSM 宠物元素。", "behaviors": [{"desc": "回忆初见时你在他怀里靠着他叫「主人」"}, {"desc": "让你跪好「贵座好」，娇规矩"}, {"desc": "娇你双手放膝盖上、抬头"}, {"desc": "认主后给你起名「乃求求／小奶球」"}, {"desc": "让你过来趴到他腿上"}, {"desc": "让你趴在腿上感受被主人抚摸"}, {"desc": "让你转一圈检查"}, {"desc": "去宠物用品店定制刻名字的宠物牌"}, {"desc": "上车让你坐好、闭眼伸手"}, {"desc": "给你戴上专属项圈，说戴上就是他的人了"}], "tone_summary": "", "genre_tags": [], "emotion_arc": "", "intensity": "", "listener_role": "", "signature_elements": [], "sensitive": false}, {"no": 28, "id": "SIe7aphoA1Q", "title": "Spend a long years with you - Chapter 01（serial）", "title_zh": "", "duration": "00:09:05", "link": "https://www.youtube.com/watch?v=SIe7aphoA1Q", "enriched": false, "lines": [{"ts": "00:00:00", "text": "字同", "speaker": "", "tone": "", "sound": []}, {"ts": "00:00:05", "text": "怎能孤来了 也不到门口迎接 孤刚为你摘了适子 你且瞧瞧", "speaker": "", "tone": "", "sound": []}, {"ts": "00:00:19", "text": "高 那算什么高 那算什么高 那算什么高 那算什么高 那算什么高 那算什么高 那算什么高 那算什么高 比识于二弟四哥一同西午时 爬得比那高 摔不着 前两日你总电记着 大哥府中那个世子书 今日收了 自然先以你唱唱", "speaker": "", "tone": "", "sound": []}, {"ts": "00:00:48", "text": "原来子同记挂得 竟是孤偷买了大哥的世子 他会不会生气 莫说是大哥府中的世子 并是天下的世子收了 你想吃 孤便摘于你 谁敢说个不字", "speaker": "", "tone": "", "sound": []}, {"ts": "00:01:10", "text": "翻墙头算的什么 真的 不记得孤还是太子的时候 翻你的墙头了 嗯", "speaker": "", "tone": "", "sound": []}, {"ts": "00:01:24", "text": "抱抱 练红了 哎呀 你这个胶修都模样了 真让孤媳化得几 你这场上是世子停不停 好吃的话 明日再给你送些", "speaker": "", "tone": "", "sound": []}, {"ts": "00:01:49", "text": "慢些吃 小时候一样 这没人予你唱 太极当心话的独自", "speaker": "", "tone": "", "sound": []}, {"ts": "00:02:02", "text": "你看看 这不就开始痛了 吃东西还跟个孩子吃的 就拿好吃的没得分寸", "speaker": "", "tone": "", "sound": []}, {"ts": "00:02:17", "text": "嗯 痛的这般厉害 手伸过来 过去检查一番 拿过来 不听话是想要手发", "speaker": "", "tone": "", "sound": []}, {"ts": "00:02:34", "text": "手这般厉害 是不是又投尺病了 老师回答 若是扎黄 承法翻倍 已到九月天气转凉 便还这些渔书也入秋了 还吃完谈凉 孤可又祝福过 吃冰不可放肆 既是有 怎还如此不听话", "speaker": "", "tone": "", "sound": []}, {"ts": "00:03:06", "text": "回答 回答", "speaker": "", "tone": "", "sound": []}, {"ts": "00:03:16", "text": "孤面前眼泪不管用 犯了错便是要罚 自己说 多少下 二十 自从可真是 想加倍了", "speaker": "", "tone": "", "sound": []}, {"ts": "00:03:38", "text": "好 就算是 今日念你腹痛 便吃大饰下 鱼下的 明日不痛了再换 可听明白了", "speaker": "", "tone": "", "sound": []}, {"ts": "00:03:53", "text": "现在请店里没有他人 把群伴心看", "speaker": "", "tone": "", "sound": []}, {"ts": "00:04:01", "text": "好好地趴在手上", "speaker": "", "tone": "", "sound": []}, {"ts": "00:04:06", "text": "好好保守 若是错了 便重来 知道了吗 那就开始 去", "speaker": "", "tone": "", "sound": []}, {"ts": "00:04:42", "text": "哎呀 绑了 给你揉揉,揉揉,揉揉,便不痛了。", "speaker": "", "tone": "", "sound": []}, {"ts": "00:04:55", "text": "我自然心疼,脸都化了,怎能不心疼。 但是,有约在些,犯错,自是要惩罚的。 尘法是为了你听话写,尝尝寄信, 怎能日日日描迟你性责忽来。 就今日,谈凉疯痛了,不难受啊。 若是不拦着你些,病了个怎么办。", "speaker": "", "tone": "", "sound": []}, {"ts": "00:05:27", "text": "知道错变好。 故让下人跟你熬碗酱汤水,乱乱沈泽。 明日再拆几个逝泽,叫人放在病里面冰震着。 凉好了,撒些白糖,再拿来给你,看好。", "speaker": "", "tone": "", "sound": []}, {"ts": "00:05:59", "text": "那纸擦擦,那纸擦擦。 梦到什么了,需要这么开心。", "speaker": "", "tone": "", "sound": []}, {"ts": "00:06:13", "text": "梦到自己是古代的皇后啊。 哎呦,你这梦还挺幸福的。 怪不得,叫你几回都不愿意醒了。", "speaker": "", "tone": "", "sound": []}, {"ts": "00:06:25", "text": "我想梦里的皇上。 哦,看了有些事,你还记得呢。 那没什么。 坐着也能睡着,睡这么久退麻了没。", "speaker": "", "tone": "", "sound": []}, {"ts": "00:06:47", "text": "你还好意思提讲,坐,听一半就睡着了。 我们还坐前台讲时看的疫情而处。 刚刚还过来问我,是不是讲的没意思,把你给讲困了。 我怎么回答? 我说你是考拉转世,每天的睡眠市场啊,要远超长人。", "speaker": "", "tone": "", "sound": []}, {"ts": "00:07:12", "text": "小时候,我说错了。 上次是谁,说好一起吃饭,结果睡过头让我等了两个小时。 嗯?", "speaker": "", "tone": "", "sound": []}, {"ts": "00:07:25", "text": "我没当然没有这么说,都你玩的。 我说你不太了解时的历史,昨天各步了一下,所以睡得晚了一点。", "speaker": "", "tone": "", "sound": []}, {"ts": "00:07:38", "text": "现在觉得不好意思啊。 没事。 这个导师跟我关系还挺好的,不会真不高兴。 你看我跟你圆多好。 邀请你听下次讲坐了,还特意定住我。 不要客户,有问题可以问他吗?", "speaker": "", "tone": "", "sound": []}, {"ts": "00:08:01", "text": "你看啊,上次吃饭放我哥子,为了补偿我, 陪我来听历史讲坐。 结果呢,你睡着了。 就算不考虑导师的邀请,陪我出来,我还要给你打圆场。 是不是,也得给我点讲历呢?", "speaker": "", "tone": "", "sound": []}, {"ts": "00:08:24", "text": "我想要的讲历,那就是,陪我听下一场讲坐。", "speaker": const TOTAL_CHANNEL = 280;
const DONE = DATA.length;
const ENRICHED = DATA.filter(r=>r.enriched).length;

function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

document.getElementById("p1v").textContent = ENRICHED + " / " + DONE + " 篇（" + Math.round(ENRICHED/DONE*100) + "%）· 余 " + (DONE-ENRICHED) + " 篇增强中";
document.getElementById("p1b").style.width = (ENRICHED/DONE*100) + "%";
document.getElementById("p2v").textContent = DONE + " / " + TOTAL_CHANNEL +
  " 篇（" + Math.round(DONE/TOTAL_CHANNEL*100) + "%）· 余 " + (TOTAL_CHANNEL-DONE) + " 篇因 YouTube 年龄墙待补";
document.getElementById("p2b").style.width = (DONE/TOTAL_CHANNEL*100) + "%";
document.getElementById("stats").innerHTML =
  "台词行数 <b>"+DATA.reduce((a,r)=>a+r.lines.length,0)+"</b> · 行为节点 <b>"+
  DATA.reduce((a,r)=>a+r.behaviors.length,0)+"</b> · 已增强 <b style='color:#16a34a'>"+ENRICHED+"</b>";

function hl(text, kw){
  if(!kw) return esc(text);
  const i = text.toLowerCase().indexOf(kw.toLowerCase());
  if(i<0) return esc(text);
  return esc(text.slice(0,i)) + "<mark>" + esc(text.slice(i,i+kw.length)) + "</mark>" + esc(text.slice(i+kw.length));
}

function fmtLine(t, kw){
  t = (t||"").trim();
  if(!t) return "";
  t = t.replace(/\s+/g, "，");
  if(!/[。！？!?]$/.test(t)) t += "。";
  return hl(t, kw);
}

function tagsHTML(arr, kw){
  return (arr||[]).map(t => '<span class="tag">'+hl(t,kw)+'</span>').join('');
}
function metaItem(k, v){
  return '<div class="meta-item"><div class="k">'+esc(k)+'</div><div class="v">'+v+'</div></div>';
}

// 台词行：富集版叠加 说话人/语气/音效 标注；基础版仅文本
function lineHTML(l, kw){
  const pre = [];
  if(l.speaker) pre.push('<span class="line-speaker">'+hl(l.speaker,kw)+'</span>');
  if(l.tone) pre.push('<span class="line-tone">'+hl(l.tone,kw)+'</span>');
  const sound = (l.sound||[]).map(s=>'<span class="line-sound">'+hl(s,kw)+'</span>').join('');
  return '<p class="tline">'+pre.join('')+fmtLine(l.text, kw)+(sound?' '+sound:'')+'</p>';
}

// 篇级分析区（仅富集篇显示）
function metaHTML(r, kw){
  if(!r.enriched) return '';
  const parts = [];
  if(r.tone_summary){
    const cls = r.sensitive ? ' class="sensitive"' : '';
    parts.push(metaItem('语气总结', '<span'+cls+'>'+hl(r.tone_summary,kw)+'</span>'));
  }
  if((r.genre_tags||[]).length) parts.push(metaItem('题材 / 关系', tagsHTML(r.genre_tags,kw)));
  if(r.emotion_arc) parts.push(metaItem('情感弧线', hl(r.emotion_arc,kw)));
  if(r.intensity) parts.push(metaItem('强度', hl(r.intensity,kw)));
  if(r.listener_role) parts.push(metaItem('听者角色', hl(r.listener_role,kw)));
  if((r.signature_elements||[]).length) parts.push(metaItem('标志性元素', tagsHTML(r.signature_elements,kw)));
  if(!parts.length) return '';
  return '<div class="sec"><div class="t">内容分析</div><div class="meta-grid">'+parts.join('')+'</div></div>';
}

function cardHTML(r, kw){
  const badge = r.enriched
    ? '<span class="badge ok">✓ 已结构化增强</span>'
    : '<span class="badge base">基础版（增强中）</span>';
  const titleText = r.title_zh || r.title;
  const beh = (r.behaviors||[]).map((b,i) =>
    '<li><span class="num">'+String(i+1)+'.</span><span>'+hl(b.desc,kw)+'</span></li>').join("");
  const lines = (r.lines||[]).map(l => lineHTML(l, kw)).join("");
  const scene = r.scene ? '<div class="scene">'+hl(r.scene,kw)+'</div>' : '<div class="empty">（无场景描述）</div>';
  const behHTML = beh || '<div class="empty">（无行为节点）</div>';
  const lineHTML2 = lines || '<div class="empty">（无台词）</div>';
  const enhHint = r.enriched ? '' : '<div class="hint">本篇尚未叠加说话人/语气/音效/分析字段，完成增强后将自动更新。</div>';
  return '<section class="card" id="v'+r.id+'" data-id="'+r.id+'">'+
    '<h2>'+String(r.no).padStart(3,"0")+'. '+hl(titleText,kw)+badge+'</h2>'+
    '<div class="meta">时长 '+esc(r.duration)+' · <a href="'+esc(r.link)+'" target="_blank" rel="noopener">YouTube 原片 ↗</a></div>'+
    '<div class="sec"><div class="t">场景</div>'+scene+'</div>'+
    metaHTML(r, kw)+
    '<div class="sec"><div class="t">行为</div><ul class="beh">'+behHTML+'</ul></div>'+
    '<div class="sec"><div class="t">台词</div><div class="transcript">'+lineHTML2+'</div></div>'+
    enhHint+
    '</section>';
}

function render(list, kw){
  document.getElementById("main").innerHTML = list.map(r=>cardHTML(r,kw)).join("");
  document.getElementById("toc").innerHTML = list.map(r =>
    '<a href="#v'+r.id+'" data-id="'+r.id+'">'+String(r.no).padStart(3,"0")+'. '+esc(r.title_zh||r.title)+'</a>').join("");
}

function search(kw){
  kw = (kw||"").trim();
  if(!kw){ render(DATA, ""); return; }
  const k = kw.toLowerCase();
  const hit = DATA.filter(r =>
    (r.title||"").toLowerCase().includes(k) ||
    (r.title_zh||"").toLowerCase().includes(k) ||
    (r.scene||"").toLowerCase().includes(k) ||
    (r.behaviors||[]).some(b => (b.desc||"").toLowerCase().includes(k)) ||
    (r.lines||[]).some(l => (l.text||"").toLowerCase().includes(k) ||
        (l.speaker||"").toLowerCase().includes(k) ||
        (l.tone||"").toLowerCase().includes(k) ||
        (l.sound||[]).some(s=>s.toLowerCase().includes(k))) ||
    (r.tone_summary||"").toLowerCase().includes(k) ||
    (r.genre_tags||[]).some(t=>t.toLowerCase().includes(k)) ||
    (r.listener_role||"").toLowerCase().includes(k) ||
    (r.signature_elements||[]).some(t=>t.toLowerCase().includes(k))
  );
  render(hit, kw);
}

render(DATA, "");
document.getElementById("search").addEventListener("input", e=>search(e.target.value));

document.getElementById("toc").addEventListener("click", e=>{
  const a = e.target.closest("a"); if(!a) return;
  e.preventDefault();
  const el = document.getElementById("v"+a.dataset.id);
  if(el) el.scrollIntoView({behavior:"smooth", block:"start"});
});
</script>
